<nz-page-header
  class="breadcrumb__container"
  nzBackIcon
  [nzGhost]="false"
  (nzBack)="handleBack()">
  <nz-page-header-title>{{ title }}</nz-page-header-title>
  <nz-page-header-extra>
    <div class="breadcrumb__actions">
      <app-button-common
        *ngFor="let b of buttons"
        [text]="b.text"
        [iconType]="b.iconType"
        (_onClick)="b.onClick($event)">
      </app-button-common>
    </div>
  </nz-page-header-extra>
</nz-page-header>
