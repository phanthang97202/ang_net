<section class="newsletter">
  <h2 class="newsletter-title">
    Đừng bỏ <span class="accent">lỡ bài viết</span><br />
    tiếp theo
  </h2>
  <p class="newsletter-subtitle">
    Mỗi tuần một bài viết, một câu chuyện nhỏ, một góc nhìn khác. Không spam,
    chỉ có nội dung thật.
  </p>

  <!-- Success state -->
  <div *ngIf="isSuccess" class="newsletter-success">
    <span class="text-3xl">🎉</span>
    <p class="newsletter-success-title">Đăng ký thành công!</p>
    <p class="newsletter-success-text">Cảm ơn bạn. Mình sẽ gửi thư sớm nhé.</p>
  </div>

  <!-- Form -->
  <ng-container *ngIf="!isSuccess">
    <div class="newsletter-form">
      <input
        type="email"
        placeholder="Nhập email của bạn"
        [(ngModel)]="form.email"
        [disabled]="isLoading"
        (keyup.enter)="handleSubmit()"
        class="newsletter-input" />
      <button
        (click)="handleSubmit()"
        [disabled]="isLoading"
        class="newsletter-btn">
        <span *ngIf="!isLoading">Đăng ký</span>
        <span *ngIf="isLoading" class="flex items-center gap-2">
          <svg class="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none">
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4" />
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8v8z" />
          </svg>
          Đang gửi...
        </span>
      </button>
    </div>

    <p *ngIf="errorMsg" class="newsletter-error">{{ errorMsg }}</p>
  </ng-container>
</section>
