<section class="bg-[#1a1a1a] py-12 px-4 md:px-8">

  <!-- Section Label -->
  <div class="flex items-center gap-4 mb-8">
    <span class="text-[#c9622f] font-['Raleway'] text-[0.65rem] font-700 tracking-[0.2em] uppercase whitespace-nowrap">
      CHỦ ĐỀ
    </span>
    <div class="flex-1 h-px bg-[#c9622f] opacity-40"></div>
  </div>

  <!-- Loading skeleton -->
  <ng-container *ngIf="isLoading">
    <div class="grid grid-cols-2 md:grid-cols-4 border border-white/10">
      <div *ngFor="let i of [1,2,3,4]"
        class="flex flex-col items-center justify-center gap-3 py-10 border-r border-white/10 last:border-r-0 animate-pulse">
        <div class="w-10 h-10 bg-white/10 rounded"></div>
        <div class="w-20 h-4 bg-white/10 rounded"></div>
        <div class="w-14 h-3 bg-white/10 rounded"></div>
      </div>
    </div>
  </ng-container>

  <!-- Topic Grid -->
  <ng-container *ngIf="!isLoading && topics.length > 0">
    <div class="grid border border-white/10"
      [ngClass]="{
        'grid-cols-2 md:grid-cols-4': topics.length >= 4,
        'grid-cols-2 md:grid-cols-3': topics.length === 3,
        'grid-cols-2':                topics.length === 2,
        'grid-cols-1':                topics.length === 1
      }">
      <a
        *ngFor="let topic of topics; trackBy: trackById"
        [routerLink]="['/category', topic.slug]"
        class="group relative flex flex-col items-center justify-center gap-3 py-10 px-4
               border-r border-white/10 last:border-r-0
               md:[&:nth-child(4n)]:border-r-0
               cursor-pointer transition-colors duration-300
               hover:bg-white/5">

        <!-- Mobile: chia border đúng theo 2 cột -->
        <span class="text-4xl select-none transition-transform duration-300 group-hover:scale-110">
          {{ topic.emoji }}
        </span>

        <h3 class="font-['Playfair_Display'] font-700 text-white text-xl text-center">
          {{ topic.name }}
        </h3>

        <p class="font-['Raleway'] text-white/40 text-xs tracking-widest">
          {{ topic.postCount }} bài viết
        </p>

        <!-- Subtle bottom line accent on hover -->
        <span class="absolute bottom-0 left-1/2 -translate-x-1/2 h-[2px] w-0 bg-[#c9622f]
                     transition-all duration-300 group-hover:w-12"></span>
      </a>
    </div>
  </ng-container>

  <!-- Empty state -->
  <ng-container *ngIf="!isLoading && topics.length === 0">
    <div class="flex items-center justify-center py-16 border border-white/10">
      <span class="font-['Raleway'] text-white/30 text-sm tracking-widest uppercase">
        Chưa có chủ đề nào
      </span>
    </div>
  </ng-container>

</section>
