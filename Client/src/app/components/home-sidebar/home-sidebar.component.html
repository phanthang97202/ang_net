<aside class="sidebar">
  <!-- About -->
  <div class="sidebar-card">
    <span class="sidebar-label">GIỚI THIỆU</span>

    <div class="about-head">
      <img
        class="about-avatar"
        src="https://res.cloudinary.com/dumdpgmgs/image/upload/v1784814350/IMG_20230128_191009_apuscf.jpg"
        alt="Phan Thang" />
      <div>
        <p class="about-name">Phan Thang</p>
        <p class="about-role">09h53 09-07-2002</p>
      </div>
    </div>

    <p class="about-bio">
      Phan Thang chia sẻ những suy nghĩ, trải nghiệm cuộc sống và góc nhìn cá
      nhân về công việc, sáng tạo và sự trưởng thành mỗi ngày.
    </p>

    <p class="about-location"><span class="about-icon">📍</span> Hà Nam City</p>

    <div class="about-socials">
      <a href="#" class="social-btn" aria-label="X / Twitter">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path
            d="M18.9 2H22l-7.6 8.7L23.3 22H16.6l-5.2-6.8L5.4 22H2.3l8.1-9.3L1.4 2h6.9l4.7 6.2L18.9 2Zm-1.2 18h1.7L7 4H5.2l12.5 16Z" />
        </svg>
      </a>
      <a href="#" class="social-btn" aria-label="Facebook">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path
            d="M13.5 22v-8.4h2.8l.4-3.3h-3.2V8.1c0-.9.3-1.6 1.7-1.6h1.7V3.5c-.3 0-1.4-.1-2.5-.1-2.6 0-4.3 1.6-4.3 4.4v2.5H7.3v3.3h2.8V22h3.4Z" />
        </svg>
      </a>
      <a href="#" class="social-btn" aria-label="Instagram">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path
            d="M12 8.6a3.4 3.4 0 1 0 0 6.8 3.4 3.4 0 0 0 0-6.8Zm0 5.6a2.2 2.2 0 1 1 0-4.4 2.2 2.2 0 0 1 0 4.4Zm4.3-5.7a.8.8 0 1 1-1.6 0 .8.8 0 0 1 1.6 0ZM20 7.8c-.05-1.06-.29-2-.98-2.72-.7-.7-1.66-.94-2.72-1C15 4 9 4 7.7 4.08c-1.06.05-2 .29-2.72.98-.7.7-.94 1.66-1 2.72C4 8.99 4 15 3.98 16.3c.05 1.06.29 2 1 2.72.7.7 1.66.94 2.72 1 1.29.07 7.29.07 8.6 0 1.06-.05 2-.29 2.72-1 .7-.7.94-1.66 1-2.72.06-1.3.06-7.3 0-8.5ZM18.4 18a3 3 0 0 1-1.7 1.7c-1.17.46-3.95.36-5.25.36s-4.08.1-5.25-.36A3 3 0 0 1 4.5 18c-.46-1.17-.36-3.95-.36-5.25s-.1-4.08.36-5.25A3 3 0 0 1 6.2 5.8c1.17-.46 3.95-.36 5.25-.36s4.08-.1 5.25.36a3 3 0 0 1 1.7 1.7c.46 1.17.36 3.95.36 5.25s.1 4.08-.36 5.25Z" />
        </svg>
      </a>
      <a href="#" class="social-btn" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path
            d="M6.9 8.7H3.6V20h3.3V8.7ZM5.3 3.5a1.9 1.9 0 1 0 0 3.8 1.9 1.9 0 0 0 0-3.8ZM20.4 20h-3.3v-5.9c0-1.4 0-3.2-2-3.2s-2.3 1.5-2.3 3.1V20H9.5V8.7h3.2v1.5h.05c.44-.83 1.5-1.7 3.1-1.7 3.3 0 3.9 2.2 3.9 5V20Z" />

      </a>
    </div>
  </div>

  <!-- Featured Posts -->
  <div class="sidebar-card">
    <span class="sidebar-label">ẢNH NỔI BẬT</span>

    <div class="featured-post">
      <img
        class="featured-post-bg"
        [src]="featuredImages[activeIndex].imageUrl"
        alt="" />
      <div class="featured-post-overlay"></div>
      <div class="featured-post-content">
        <p class="featured-post-title">
          {{ featuredImages[activeIndex].caption }}
        </p>
      </div>
      <div class="featured-post-dots">
        <span
          *ngFor="let img of featuredImages; let i = index"
          class="dot"
          [class.active]="i === activeIndex"
          (click)="setActive(i)"></span>
      </div>
    </div>
  </div>
</aside>
