<div class="ai-assistant">
  <div class="ai-assistant-toolbar">
    <button nz-button nzType="text" nzSize="small" (click)="newConversation()">
      <span nz-icon nzType="plus-circle" nzTheme="outline"></span>
      Cuộc trò chuyện mới
    </button>
  </div>

  <div class="ai-assistant-messages" #chatContainer>
    <div
      *ngFor="let msg of messages"
      class="ai-message"
      [class.ai-message--user]="msg.role === 'user'">
      <div class="ai-bubble">{{ msg.content }}</div>
    </div>

    <div class="ai-message" *ngIf="isLoading">
      <div class="ai-bubble ai-bubble--loading">
        <span nz-icon nzType="loading" nzTheme="outline"></span>
        Đang tra cứu dữ liệu ca trực...
      </div>
    </div>
  </div>

  <div class="ai-assistant-input">
    <input
      nz-input
      placeholder="Hỏi về ca trực gần nhất..."
      [(ngModel)]="question"
      (keydown.enter)="send()"
      [disabled]="isLoading" />
    <button
      nz-button
      nzType="primary"
      (click)="send()"
      [nzLoading]="isLoading"
      [disabled]="!question.trim()">
      <span nz-icon nzType="send"></span>
    </button>
  </div>
</div>
